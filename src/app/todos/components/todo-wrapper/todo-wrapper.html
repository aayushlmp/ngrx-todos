<div class="mt-[10%] flex flex-row justify-center items-center">
  <section class="flex flex-col min-w-[400px] text-gray-600">
    <section class="flex flex-row justify-between">
      <h1 class="text-2xl mb-4">Todo Manager</h1>
      <h1 class="text-2xl mb-4">({{ completedTodos().length }} / {{ todos().length }})</h1>
    </section>
    <section>
      <app-add-todo-form [selectedTodo]="selectedTodo()"></app-add-todo-form>
    </section>
    <section>
      @if (todos().length) {
        <app-todo-list></app-todo-list>
      } @else {
        <div class="flex flex-row font-sans text-gray-600 justify-between py-2">
          No Todos available, please add at least one
        </div>
      }
    </section>
  </section>
</div>
