<form class="mb-4" [formRoot]="addTodoForm" (submit)="submitNewTodo()">
  <div class="flex gap-2">
    <!-- Input -->
    <input
      id="todoInput"
      type="text"
      placeholder="What needs to be done?"
      [formField]="addTodoForm.title"
      class="flex-1 px-4 py-2 border rounded-lg focus:outline-none focus:ring-1 focus:ring-indigo-500 disabled:bg-gray-100"
      [class]="{
        'focus:ring-red-500':
          addTodoForm.title().invalid() &&
          (addTodoForm.title().touched() || addTodoForm.title().dirty()),
        'border-red-500':
          addTodoForm.title().invalid() &&
          (addTodoForm.title().touched() || addTodoForm.title().dirty()),
      }"
    />
    <!-- Add Button -->
    <button
      id="addBtn"
      type="submit"
      class="bg-indigo-600 text-white px-4 py-2 cursor-pointer rounded-lg hover:bg-indigo-700 disabled:opacity-50 disabled:cursor-not-allowed"
    >
      Add
    </button>
  </div>

  <!-- Validation Message -->
  <!-- @if (addTodoForm.title().invalid()) {
    @for (error of addTodoForm.title().errors(); track error) {
      <div class="text-red-700 mt-2">{{ error.message }}</div>
    }
  } -->
</form>
